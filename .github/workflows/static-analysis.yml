# ============================================================================
# .github/workflows/static-analysis.yml
# ============================================================================
# Runs static analysers (cppcheck and clang-tidy) on every push / PR.
# A dedicated workflow gives this check its own badge in the README.
# ============================================================================

name: Static Analysis

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            clang-tidy

      # Collect source files once and share between both analysers.
      - name: Collect C source files
        id: sources
        run: |
          ALL=$(find . \( -name "*.c" -o -name "*.h" \) \
            | grep -v "tests/mock_posix.c" \
            | tr '\n' ' ')
          C_ONLY=$(find . -maxdepth 2 -name "*.c" \
            | grep -v "tests/" \
            | tr '\n' ' ')
          echo "all=$ALL"    >> "$GITHUB_OUTPUT"
          echo "c_only=$C_ONLY" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # cppcheck – bug-focused static analysis: undefined behaviour,
      # memory issues and performance hints.
      #
      # Style checks are intentionally omitted (--enable does NOT include
      # "style") because Norminette is the authoritative style checker for
      # this project.  Enabling cppcheck's style category would produce
      # findings that directly conflict with 42 Norm conventions (e.g.
      # short variable names, function structure).
      # ------------------------------------------------------------------
      - name: Run cppcheck
        id: cppcheck
        run: |
          set +e
          cppcheck \
            --enable=warning,performance,portability \
            --std=c11 \
            --suppress=missingIncludeSystem \
            -Iincludes \
            --error-exitcode=1 \
            --output-file=cppcheck.log \
            ${{ steps.sources.outputs.all }}
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat cppcheck.log
          set -e

      - name: Upload cppcheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-log
          path: cppcheck.log
          if-no-files-found: ignore

      # ------------------------------------------------------------------
      # clang-tidy – compiler-level checks for bugs, security and
      # portability issues.
      #
      # Style-oriented check groups (readability-*, modernize-*) are
      # explicitly excluded: style is owned by Norminette.  The retained
      # groups (bugprone-*, cert-*, clang-analyzer-*, performance-*,
      # portability-*) surface bugs and security issues only.
      # ------------------------------------------------------------------
      - name: Run clang-tidy
        id: clang_tidy
        run: |
          set +e
          clang-tidy \
            --checks="bugprone-*,cert-*,clang-analyzer-*,performance-*,portability-*,-readability-*,-modernize-*" \
            -p . \
            --extra-arg=-Iincludes \
            --extra-arg=-std=c11 \
            --extra-arg=-pthread \
            ${{ steps.sources.outputs.c_only }} \
            -- \
            2>&1 | tee clang-tidy.log
          # Capture clang-tidy's exit code, not tee's
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload clang-tidy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-log
          path: clang-tidy.log
          if-no-files-found: ignore

      - name: Assert analysis results
        run: |
          FAIL=0
          if [ "${{ steps.cppcheck.outputs.exit_code }}" != "0" ]; then
            echo "::error::cppcheck reported issues. See cppcheck-log artifact."
            FAIL=1
          fi
          if [ "${{ steps.clang_tidy.outputs.exit_code }}" != "0" ]; then
            echo "::error::clang-tidy reported issues. See clang-tidy-log artifact."
            FAIL=1
          fi
          exit $FAIL
