# ============================================================================
# .github/workflows/philo-ci.yml
# ============================================================================
# Core CI pipeline for the 42 "philosophers" project.
#
# Jobs
# ----
#  build                 – Compile philo with three sanitizer variants (none/tsan/asan)
#  test                  – Run philo-test.py (5 axioms + stress loop)
#  mock-posix            – Build mock_posix.so and test systematic + random failure modes
#  scheduler-mock-stress – Stress test with artificial thread-interleaving delays
#
# Additional checks with their own badges live in dedicated workflow files:
#   norminette.yml       – 42 Norminette style checker
#   sanitizers.yml       – ThreadSanitizer + Valgrind (volatility)
#   static-analysis.yml  – cppcheck + clang-tidy
#
# ============================================================================

name: Philosophers CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-flight runs for the same branch to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Restrict GITHUB_TOKEN to the minimum required permissions
# ---------------------------------------------------------------------------
permissions:
  contents: read

# ---------------------------------------------------------------------------
# Shared defaults
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Global environment used by several jobs
# ---------------------------------------------------------------------------
env:
  BINARY: ./philo
  # Timeout (seconds) given to each individual test inside philo-test.py
  TEST_TIMEOUT: 30

jobs:
  # ==========================================================================
  # Job 1 – Build (matrix: none / thread / address sanitizer)
  # ==========================================================================
  build:
    name: Build (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none, thread, address]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Derive extra compiler/linker flags from the matrix dimension.
      - name: Set sanitizer flags
        id: san_flags
        run: |
          case "${{ matrix.sanitizer }}" in
            thread)
              echo "cflags=-fsanitize=thread -g" >> "$GITHUB_OUTPUT"
              echo "ldflags=-fsanitize=thread"   >> "$GITHUB_OUTPUT"
              ;;
            address)
              echo "cflags=-fsanitize=address,undefined -g" >> "$GITHUB_OUTPUT"
              echo "ldflags=-fsanitize=address,undefined"   >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "cflags=-g"  >> "$GITHUB_OUTPUT"
              echo "ldflags="   >> "$GITHUB_OUTPUT"
              ;;
          esac

      # Build using the project Makefile if present, otherwise fall back to a
      # direct gcc compilation of every .c file found in the repository root.
      - name: Compile philo
        run: |
          EXTRA_CFLAGS="${{ steps.san_flags.outputs.cflags }}"
          EXTRA_LDFLAGS="${{ steps.san_flags.outputs.ldflags }}"
          if [ -f Makefile ]; then
            make CFLAGS="-Wall -Wextra -Werror $EXTRA_CFLAGS" \
                 LDFLAGS="$EXTRA_LDFLAGS" \
                 2>&1 | tee build-${{ matrix.sanitizer }}.log
          else
            # Fallback: compile all .c files in the root directory.
            C_FILES=$(find . -maxdepth 2 -name "*.c" \
              | grep -v "tests/mock_posix.c" \
              | tr '\n' ' ')
            gcc -Wall -Wextra -Werror $EXTRA_CFLAGS \
                -Iincludes \
                $C_FILES \
                -o philo \
                -lpthread $EXTRA_LDFLAGS \
                2>&1 | tee build-${{ matrix.sanitizer }}.log
          fi

      # Keep the built binary and log as a named artifact so downstream jobs
      # and the sanitizer job can download them.
      - name: Upload binary and build log
        uses: actions/upload-artifact@v4
        with:
          name: philo-${{ matrix.sanitizer }}
          path: |
            philo
            build-${{ matrix.sanitizer }}.log

  # ==========================================================================
  # Job 2 – Functional tests (5 axioms + stress loop)
  # ==========================================================================
  test:
    name: Functional tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the plain (no-sanitizer) binary produced by the build job.
      - name: Download philo binary (none)
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Run the Python test suite.
      - name: Run philo-test.py
        id: philo_test
        run: |
          set +e
          python3 philo-test.py \
            --binary ./philo \
            --timeout ${{ env.TEST_TIMEOUT }} \
            --stress-iterations 5 \
            2>&1 | tee philo-test.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: philo-test-log
          path: philo-test.log

      - name: Assert test result
        if: steps.philo_test.outputs.exit_code != '0'
        run: |
          echo "::error::philo-test.py reported failures. See philo-test-log artifact."
          exit 1

  # ==========================================================================
  # Job 3 – Mock POSIX failure injection
  # ==========================================================================
  mock-posix:
    name: Mock POSIX (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        mode: [systematic_malloc, systematic_pthread, random]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download philo binary (none)
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Build the mock shared library.
      - name: Build mock_posix.so
        run: |
          gcc -shared -fPIC \
              -o mock_posix.so \
              tests/mock_posix.c \
              -ldl \
              2>&1 | tee mock-build.log

      # Run the binary with failure injection and expect a non-zero exit or
      # a log that contains "[mock_posix]" injection messages, confirming
      # that errors are handled gracefully (no crash / segfault).
      - name: Run with ${{ matrix.mode }} failure injection
        id: mock_run
        run: |
          set +e
          case "${{ matrix.mode }}" in
            systematic_malloc)
              ENV_FLAGS="TEST_MALLOC_1=1"
              ;;
            systematic_pthread)
              ENV_FLAGS="TEST_PTHREAD_CREATE=1"
              ;;
            random)
              ENV_FLAGS="TEST_RANDOM_FAIL=1"
              ;;
          esac
          export $ENV_FLAGS
          LD_PRELOAD=./mock_posix.so ./philo 5 800 200 200 \
            2>&1 | tee mock-${{ matrix.mode }}.log
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"

          # Verify that injection messages actually appeared in stderr/stdout
          if grep -q "\[mock_posix\]" mock-${{ matrix.mode }}.log; then
            echo "::notice::Failure injection confirmed for mode ${{ matrix.mode }}"
          else
            echo "::warning::No injection log found – mock_posix.so may not be loaded"
          fi
          set -e

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-${{ matrix.mode }}-log
          path: mock-${{ matrix.mode }}.log

  # ==========================================================================
  # Job 4 – Scheduler mock (rare interleaving stress test)
  # ==========================================================================
  #
  # scheduler_mock.so intercepts pthread_create and pthread_mutex_lock and
  # injects small artificial delays (0–500 µs by default) before each call.
  # This pushes threads into orderings they would almost never reach in a
  # normal run, dramatically increasing the chance of surfacing deadlocks and
  # data races that are otherwise hard to reproduce.
  #
  # A thin wrapper script (philo_sched) sets LD_PRELOAD only for the philo
  # process, keeping Python itself free of the library so its GIL operations
  # are not slowed down.
  # ==========================================================================
  scheduler-mock-stress:
    name: Scheduler Mock (rare interleaving stress)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the plain (no-sanitizer) binary.
      - name: Download philo binary (none)
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Build the scheduler mock shared library from tests/scheduler_mock.c.
      - name: Build libscheduler_mock.so
        run: |
          gcc -shared -fPIC \
              -o libscheduler_mock.so \
              tests/scheduler_mock.c \
              -ldl \
              2>&1 | tee scheduler-mock-build.log

      # Create a thin wrapper script that injects LD_PRELOAD only for philo,
      # not for the Python interpreter that drives philo-test.py.
      - name: Create philo wrapper with LD_PRELOAD
        run: |
          cat > philo_sched << 'WRAPPER'
          #!/bin/sh
          exec env LD_PRELOAD="$(cd "$(dirname "$0")" && pwd)/libscheduler_mock.so" \
               "$(cd "$(dirname "$0")" && pwd)/philo" "$@"
          WRAPPER
          chmod +x philo_sched

      # Run the full philo-test.py suite via the wrapper binary.
      # The scheduler mock forces rare thread interleavings without altering
      # the binary under test; axiom checks remain valid.
      - name: Run stress tests with scheduler mock
        id: sched_test
        run: |
          set +e
          SCHED_MOCK_MODE=random \
          SCHED_MOCK_MAX_US=500 \
          SCHED_MOCK_SEED=42 \
            python3 philo-test.py \
              --binary ./philo_sched \
              --timeout ${{ env.TEST_TIMEOUT }} \
              --stress-iterations 10 \
              2>&1 | tee scheduler-mock-stress.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload scheduler mock logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-mock-stress-log
          path: |
            scheduler-mock-stress.log
            scheduler-mock-build.log
          if-no-files-found: ignore

      - name: Assert scheduler mock result
        if: steps.sched_test.outputs.exit_code != '0'
        run: |
          echo "::error::Scheduler mock stress tests failed. See scheduler-mock-stress-log artifact."
          exit 1
