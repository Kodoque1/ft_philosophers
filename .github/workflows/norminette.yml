# ============================================================================
# .github/workflows/norminette.yml
# ============================================================================
# Runs the official 42 Norminette style checker on every push / PR.
# A dedicated workflow gives this check its own badge in the README.
# ============================================================================

name: Norminette

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  norminette:
    name: Norminette
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Norminette
        run: pip3 install norminette --quiet || true

      - name: Run Norminette
        id: norminette
        run: |
          set +e
          norminette $(find . \( -name "*.c" -o -name "*.h" \) \
            | grep -v "tests/mock_posix.c") \
            | tee norminette.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload Norminette log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: norminette-log
          path: norminette.log
          if-no-files-found: ignore

      - name: Assert Norminette result
        if: steps.norminette.outputs.exit_code != '0'
        run: |
          echo "::error::Norminette reported style errors. See norminette-log artifact."
          exit 1
