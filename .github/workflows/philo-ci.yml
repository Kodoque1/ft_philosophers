# ============================================================================
# .github/workflows/philo-ci.yml
# ============================================================================
# Full CI pipeline for the 42 "philosophers" project.
#
# Jobs
# ----
#  lint          – Norminette style check (42 norm) and basic C linting
#  build         – Compile philo with three sanitizer variants (none/tsan/asan)
#  test          – Run philo-test.py (5 axioms + stress loop)
#  mock-posix    – Build mock_posix.so and test systematic + random failure modes
#  sanitizers    – Re-run philo-test.py under ThreadSanitizer or Valgrind
#
# Badge
# -----
# Add the following to your README.md (adjust owner/repo):
#
#   [![CI](https://github.com/<owner>/ft_philosophers/actions/workflows/philo-ci.yml/badge.svg)](https://github.com/<owner>/ft_philosophers/actions/workflows/philo-ci.yml)
#
# ============================================================================

name: Philosophers CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-flight runs for the same branch to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Restrict GITHUB_TOKEN to the minimum required permissions
# ---------------------------------------------------------------------------
permissions:
  contents: read

# ---------------------------------------------------------------------------
# Shared defaults
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Global environment used by several jobs
# ---------------------------------------------------------------------------
env:
  BINARY: ./philo
  # Timeout (seconds) given to each individual test inside philo-test.py
  TEST_TIMEOUT: 30

jobs:
  # ==========================================================================
  # Job 1 – Lint / Norminette
  # ==========================================================================
  lint:
    name: Lint / Norminette
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Norminette (official 42 style checker).
      # Falls back gracefully if pip is unavailable in the runner.
      - name: Install Norminette
        run: |
          pip3 install norminette --quiet || true

      # Run Norminette on all .c and .h files.
      # We capture the exit code so we can upload logs even on failure.
      - name: Run Norminette
        id: norminette
        run: |
          set +e
          norminette $(find . \( -name "*.c" -o -name "*.h" \) \
            | grep -v "tests/mock_posix.c") \
            | tee norminette.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload Norminette log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: norminette-log
          path: norminette.log
          if-no-files-found: ignore

      # Fail the job if Norminette reported errors
      - name: Assert Norminette result
        if: steps.norminette.outputs.exit_code != '0'
        run: |
          echo "::error::Norminette reported style errors. See norminette-log artifact."
          exit 1

  # ==========================================================================
  # Job 2 – Build (matrix: none / thread / address sanitizer)
  # ==========================================================================
  build:
    name: Build (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [none, thread, address]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Derive extra compiler/linker flags from the matrix dimension.
      - name: Set sanitizer flags
        id: san_flags
        run: |
          case "${{ matrix.sanitizer }}" in
            thread)
              echo "cflags=-fsanitize=thread -g" >> "$GITHUB_OUTPUT"
              echo "ldflags=-fsanitize=thread"   >> "$GITHUB_OUTPUT"
              ;;
            address)
              echo "cflags=-fsanitize=address,undefined -g" >> "$GITHUB_OUTPUT"
              echo "ldflags=-fsanitize=address,undefined"   >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "cflags=-g"  >> "$GITHUB_OUTPUT"
              echo "ldflags="   >> "$GITHUB_OUTPUT"
              ;;
          esac

      # Build using the project Makefile if present, otherwise fall back to a
      # direct gcc compilation of every .c file found in the repository root.
      - name: Compile philo
        run: |
          EXTRA_CFLAGS="${{ steps.san_flags.outputs.cflags }}"
          EXTRA_LDFLAGS="${{ steps.san_flags.outputs.ldflags }}"
          if [ -f Makefile ]; then
            make CFLAGS="-Wall -Wextra -Werror $EXTRA_CFLAGS" \
                 LDFLAGS="$EXTRA_LDFLAGS" \
                 2>&1 | tee build-${{ matrix.sanitizer }}.log
          else
            # Fallback: compile all .c files in the root directory.
            C_FILES=$(find . -maxdepth 2 -name "*.c" \
              | grep -v "tests/mock_posix.c" \
              | tr '\n' ' ')
            gcc -Wall -Wextra -Werror $EXTRA_CFLAGS \
                -Iincludes \
                $C_FILES \
                -o philo \
                -lpthread $EXTRA_LDFLAGS \
                2>&1 | tee build-${{ matrix.sanitizer }}.log
          fi

      # Keep the built binary and log as a named artifact so downstream jobs
      # and the sanitizer job can download them.
      - name: Upload binary and build log
        uses: actions/upload-artifact@v4
        with:
          name: philo-${{ matrix.sanitizer }}
          path: |
            philo
            build-${{ matrix.sanitizer }}.log

  # ==========================================================================
  # Job 3 – Functional tests (5 axioms + stress loop)
  # ==========================================================================
  test:
    name: Functional tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the plain (no-sanitizer) binary produced by the build job.
      - name: Download philo binary (none)
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Run the Python test suite.
      - name: Run philo-test.py
        id: philo_test
        run: |
          set +e
          python3 philo-test.py \
            --binary ./philo \
            --timeout ${{ env.TEST_TIMEOUT }} \
            --stress-iterations 5 \
            2>&1 | tee philo-test.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: philo-test-log
          path: philo-test.log

      - name: Assert test result
        if: steps.philo_test.outputs.exit_code != '0'
        run: |
          echo "::error::philo-test.py reported failures. See philo-test-log artifact."
          exit 1

  # ==========================================================================
  # Job 4 – Mock POSIX failure injection
  # ==========================================================================
  mock-posix:
    name: Mock POSIX (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        mode: [systematic_malloc, systematic_pthread, random]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download philo binary (none)
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Build the mock shared library.
      - name: Build mock_posix.so
        run: |
          gcc -shared -fPIC \
              -o mock_posix.so \
              tests/mock_posix.c \
              -ldl \
              2>&1 | tee mock-build.log

      # Run the binary with failure injection and expect a non-zero exit or
      # a log that contains "[mock_posix]" injection messages, confirming
      # that errors are handled gracefully (no crash / segfault).
      - name: Run with ${{ matrix.mode }} failure injection
        id: mock_run
        run: |
          set +e
          case "${{ matrix.mode }}" in
            systematic_malloc)
              ENV_FLAGS="TEST_MALLOC_1=1"
              ;;
            systematic_pthread)
              ENV_FLAGS="TEST_PTHREAD_CREATE=1"
              ;;
            random)
              ENV_FLAGS="TEST_RANDOM_FAIL=1"
              ;;
          esac
          export $ENV_FLAGS
          LD_PRELOAD=./mock_posix.so ./philo 5 800 200 200 \
            2>&1 | tee mock-${{ matrix.mode }}.log
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"

          # Verify that injection messages actually appeared in stderr/stdout
          if grep -q "\[mock_posix\]" mock-${{ matrix.mode }}.log; then
            echo "::notice::Failure injection confirmed for mode ${{ matrix.mode }}"
          else
            echo "::warning::No injection log found – mock_posix.so may not be loaded"
          fi
          set -e

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-${{ matrix.mode }}-log
          path: mock-${{ matrix.mode }}.log

  # ==========================================================================
  # Job 5 – Sanitizers (ThreadSanitizer) and Valgrind
  # ==========================================================================
  sanitizers:
    name: Sanitizer / Valgrind (${{ matrix.tool }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        tool: [tsan, valgrind]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ThreadSanitizer: download the tsan-compiled binary.
      - name: Download philo-tsan binary
        if: matrix.tool == 'tsan'
        uses: actions/download-artifact@v4
        with:
          name: philo-thread

      # Valgrind: use the plain binary (tsan and valgrind are incompatible).
      - name: Download philo-none binary
        if: matrix.tool == 'valgrind'
        uses: actions/download-artifact@v4
        with:
          name: philo-none

      - name: Make binary executable
        run: chmod +x philo

      # Install Valgrind if needed.
      - name: Install Valgrind
        if: matrix.tool == 'valgrind'
        run: sudo apt-get install -y --no-install-recommends valgrind

      # Run a short simulation under the chosen tool.
      - name: Run under ${{ matrix.tool }}
        id: san_run
        run: |
          set +e
          if [ "${{ matrix.tool }}" = "tsan" ]; then
            # ThreadSanitizer is compiled into the binary; just run it.
            TSAN_OPTIONS="halt_on_error=0 log_path=tsan.log" \
              ./philo 5 800 200 200 &
            PID=$!
            sleep 6
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            cat tsan.log* 2>/dev/null | tee sanitizer-tsan.log
            if grep -q "DATA RACE\|WARNING: ThreadSanitizer" sanitizer-tsan.log 2>/dev/null; then
              echo "::error::ThreadSanitizer detected data races!"
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::No ThreadSanitizer issues detected"
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
            fi
          else
            # Valgrind: check for memory errors and leaks.
            valgrind \
              --tool=memcheck \
              --leak-check=full \
              --error-exitcode=1 \
              --log-file=sanitizer-valgrind.log \
              ./philo 4 310 200 100 &
            PID=$!
            sleep 6
            kill $PID 2>/dev/null || true
            wait $PID 2>/dev/null || true
            cat sanitizer-valgrind.log | tee /dev/stderr
            if grep -qE "ERROR SUMMARY: [1-9][0-9]* error" sanitizer-valgrind.log; then
              echo "::error::Valgrind reported memory errors!"
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::No Valgrind memory errors detected"
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
            fi
          fi
          set -e

      - name: Upload sanitizer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-${{ matrix.tool }}-log
          path: sanitizer-*.log
          if-no-files-found: ignore

      - name: Assert sanitizer result
        if: steps.san_run.outputs.exit_code != '0'
        run: |
          echo "::error::Sanitizer/Valgrind reported issues. See sanitizer-${{ matrix.tool }}-log artifact."
          exit 1
