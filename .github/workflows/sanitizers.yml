# ============================================================================
# .github/workflows/sanitizers.yml
# ============================================================================
# Volatility / memory-safety CI — runs the philo binary under
# ThreadSanitizer and Valgrind to catch data races and memory leaks.
# A dedicated workflow gives this check its own badge in the README.
# ============================================================================

name: Sanitizers

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  TEST_TIMEOUT: 30

jobs:
  sanitizers:
    name: Sanitizer / Valgrind (${{ matrix.tool }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [tsan, valgrind]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the binary with the sanitizer flags needed for this matrix leg.
      - name: Compile philo
        run: |
          if [ "${{ matrix.tool }}" = "tsan" ]; then
            EXTRA_CFLAGS="-fsanitize=thread -g"
            EXTRA_LDFLAGS="-fsanitize=thread"
          else
            EXTRA_CFLAGS="-g"
            EXTRA_LDFLAGS=""
          fi
          if [ -f Makefile ]; then
            make CFLAGS="-Wall -Wextra -Werror $EXTRA_CFLAGS" \
                 LDFLAGS="$EXTRA_LDFLAGS" \
                 2>&1 | tee build-${{ matrix.tool }}.log
          else
            C_FILES=$(find . -maxdepth 2 -name "*.c" \
              | grep -v "tests/" \
              | tr '\n' ' ')
            gcc -Wall -Wextra -Werror $EXTRA_CFLAGS \
                -Iincludes \
                $C_FILES \
                -o philo \
                -lpthread $EXTRA_LDFLAGS \
                2>&1 | tee build-${{ matrix.tool }}.log
          fi

      - name: Install Valgrind
        if: matrix.tool == 'valgrind'
        run: sudo apt-get install -y --no-install-recommends valgrind

      # -----------------------------------------------------------------------
      # ThreadSanitizer: run the full philo-test.py suite against the
      # TSan-instrumented binary.  This gives two independent layers of
      # coverage in a single pass:
      #   • philo-test.py checks the 5 dining-philosopher axioms and the
      #     PBT invariants (timing, ghost actions, fork exclusivity, …)
      #   • TSan detects unsynchronised memory accesses triggered by those
      #     exact same test scenarios
      # Without philo-test.py, TSan would only exercise one hard-coded
      # scenario for 6 s; with it, TSan inspects every code path that the
      # invariant suite exercises.
      # --stress-iterations 3: fewer than the default 5 to keep total CI
      # time reasonable under TSan's ~2–5× execution overhead.
      # -----------------------------------------------------------------------
      - name: Run under tsan (philo-test.py + TSan)
        if: matrix.tool == 'tsan'
        id: tsan_run
        run: |
          set +e
          TSAN_OPTIONS="halt_on_error=0 log_path=tsan.log" \
            python3 philo-test.py \
              --binary ./philo \
              --timeout ${{ env.TEST_TIMEOUT }} \
              --stress-iterations 3 \
              2>&1 | tee sanitizer-tsan.log
          PHILO_EXIT=$?
          # Append any TSan report lines to the combined log.
          cat tsan.log* 2>/dev/null >> sanitizer-tsan.log || true
          RACE=0
          if grep -q "DATA RACE\|WARNING: ThreadSanitizer" tsan.log* 2>/dev/null; then
            echo "::error::ThreadSanitizer detected data races!"
            RACE=1
          else
            echo "::notice::No ThreadSanitizer issues detected"
          fi
          if [ "$PHILO_EXIT" != "0" ]; then
            echo "::error::philo-test.py reported invariant failures under TSan."
          fi
          # Fail if either TSan or philo-test.py found a problem.
          echo "exit_code=$(( RACE | PHILO_EXIT ))" >> "$GITHUB_OUTPUT"
          set -e

      # -----------------------------------------------------------------------
      # Valgrind: memory-error check.  Valgrind adds ~10–30× execution
      # overhead which would cause wall-clock timing invariants to fire
      # spuriously, so philo-test.py's timing-sensitive tests are not used
      # here.  Instead, run a few representative scenarios manually and
      # inspect the Valgrind log for real memory errors.
      # -----------------------------------------------------------------------
      - name: Run under valgrind (memory check)
        if: matrix.tool == 'valgrind'
        id: valgrind_run
        run: |
          set +e
          # Scenario 1: no-death (5 philos, 800 ms budget) – run for 6 s
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --log-file=valgrind-1.log \
            ./philo 5 800 200 200 &
          PID1=$!
          sleep 6
          kill $PID1 2>/dev/null || true
          wait $PID1 2>/dev/null || true
          # Scenario 2: must-eat (terminates naturally, easier to collect leaks)
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --log-file=valgrind-2.log \
            ./philo 5 800 200 200 3
          # Scenario 3: single philosopher (must die)
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --log-file=valgrind-3.log \
            ./philo 1 800 200 200
          cat valgrind-*.log | tee sanitizer-valgrind.log
          MEM_ERR=0
          if grep -qE "ERROR SUMMARY: [1-9][0-9]* error" valgrind-*.log 2>/dev/null; then
            echo "::error::Valgrind reported memory errors!"
            MEM_ERR=1
          else
            echo "::notice::No Valgrind memory errors detected"
          fi
          echo "exit_code=$MEM_ERR" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload sanitizer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-${{ matrix.tool }}-log
          path: sanitizer-*.log
          if-no-files-found: ignore

      - name: Assert sanitizer result
        run: |
          CODE=${{ steps.tsan_run.outputs.exit_code || steps.valgrind_run.outputs.exit_code }}
          if [ "$CODE" != "0" ]; then
            echo "::error::Sanitizer/Valgrind reported issues. See sanitizer-${{ matrix.tool }}-log artifact."
            exit 1
          fi
